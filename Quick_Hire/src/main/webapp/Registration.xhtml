<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Register</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT PANEL */
        .left {
            flex: 1;
            background: linear-gradient(135deg, #0f9b8e, #1f6fdc);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .left h1 {
            font-size: 34px;
            margin-bottom: 20px;
        }

        .left p {
            font-size: 15px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .features {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        /* RIGHT PANEL */
        .right {
            flex: 1;
            background: #f8f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 420px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        h2 {
            margin-bottom: 5px;
        }

        .sub {
            font-size: 14px;
            color: #777;
            margin-bottom: 15px;
        }

        .input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .input:focus {
            border-color: #1f6fdc;
            outline: none;
            box-shadow: 0 0 5px rgba(31,111,220,0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(to right, #0f9b8e, #1f6fdc);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .bottom {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .bottom a {
            color: #1f6fdc;
        }

        .error {
            color: red;
            font-size: 12px;
        }

    </style>
</h:head>

<h:body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">
        <div class="logo">QuickHire</div>

        <h1>Create your account</h1>

        <p>
            Join our platform to connect with opportunities,
            manage hiring, and simplify recruitment workflows.
        </p>

        <div class="features">
            <span>&#10004; Smart Screening</span>
            <span>&#10004; Secure &amp; Fast</span>
            <span>&#10004; Easy Hiring</span>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
        <div class="card">

            <h:form>

                <h2>Sign up</h2>
                <div class="sub">Fill in your details to continue</div>

                <h:messages styleClass="error"/>

                <!-- BASIC INFO -->
                <h:inputText value="#{registrationJSFManagedBean.user.userName}"
                             styleClass="input" required="true">
                    <f:passThroughAttribute name="placeholder" value="Username"/>
                </h:inputText>

                <h:inputText value="#{registrationJSFManagedBean.user.userEmail}"
                             styleClass="input" required="true">
                    <f:passThroughAttribute name="placeholder" value="Email"/>
                </h:inputText>

                <h:inputSecret value="#{registrationJSFManagedBean.user.userPassword}"
                               styleClass="input" required="true">
                    <f:passThroughAttribute name="placeholder" value="Password"/>
                </h:inputSecret>

                <!-- ROLE -->
                <h:selectOneMenu value="#{registrationJSFManagedBean.roleId}"
                                 styleClass="input">
                    <f:selectItem itemLabel="Select Role" itemValue="#{null}" />
                    <f:selectItem itemLabel="Candidate" itemValue="2" />
                    <f:selectItem itemLabel="Recruiter" itemValue="3" />
                    <f:ajax execute="@this" render="rolePanel"/>
                </h:selectOneMenu>

                <!-- ROLE BASED -->
                <h:panelGroup id="rolePanel">

                    <!-- Candidate -->
                    <h:panelGroup rendered="#{registrationJSFManagedBean.roleId == 2}">

                        <h:inputText value="#{registrationJSFManagedBean.candidate.candidatePhone}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Phone"/>
                        </h:inputText>

                        <h:inputText value="#{registrationJSFManagedBean.candidate.candidateLocation}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Location"/>
                        </h:inputText>

                        <h:inputText value="#{registrationJSFManagedBean.candidate.candidateDOB}"
                                     styleClass="input">
                            <f:passThroughAttribute name="type" value="date"/>
                            <f:convertDateTime pattern="yyyy-MM-dd"/>
                        </h:inputText>

                        <h:selectOneMenu value="#{registrationJSFManagedBean.candidate.candidateGender}"
                                         styleClass="input">
                            <f:selectItem itemLabel="Gender" itemValue="" />
                            <f:selectItem itemLabel="Male" itemValue="Male"/>
                            <f:selectItem itemLabel="Female" itemValue="Female"/>
                        </h:selectOneMenu>

                        <h:inputText value="#{registrationJSFManagedBean.candidate.candidateExperience}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Experience"/>
                        </h:inputText>

                    </h:panelGroup>

                    <!-- Recruiter -->
                    <h:panelGroup rendered="#{registrationJSFManagedBean.roleId == 3}">

                        <h:inputText value="#{registrationJSFManagedBean.recruiter.designation}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Designation"/>
                        </h:inputText>

                        <h:inputText value="#{registrationJSFManagedBean.recruiter.recruiterPhone}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Phone"/>
                        </h:inputText>

                        <h:inputText value="#{registrationJSFManagedBean.recruiter.companyId.companyId}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Company ID"/>
                        </h:inputText>

                    </h:panelGroup>

                </h:panelGroup>

                <!-- BUTTON -->
                <h:commandButton value="Register"
                                 action="#{registrationJSFManagedBean.registerUser}"
                                 styleClass="btn"/>

                <!-- LOGIN LINK -->
                <div class="bottom">
                    Already have an account?
                    <h:link value="Sign in" outcome="Login.jsf"/>
                </div>

            </h:form>

        </div>
    </div>

</div>

</h:body>
</html>
