<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
                      "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Register</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            flex: 1;
            background: linear-gradient(135deg, #0f9b8e, #1f6fdc);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .left h1 {
            font-size: 34px;
            margin-bottom: 20px;
        }

        .left p {
            font-size: 15px;
        }

        .features {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .right {
            flex: 1;
            background: #f8f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 420px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(to right, #0f9b8e, #1f6fdc);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 12px;
        }

        .bottom {
            text-align: center;
            margin-top: 15px;
        }
        
        /* container */
        .toggle-container{
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0;
        }

        /* label */
        .toggle-label{
            font-size: 14px;
            color: #333;
        }

        /* switch wrapper */
        .switch{
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        /* hide checkbox */
        .switch input{
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* slider background */
        .slider{
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }

        /* circle knob */
        .slider:before{
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        /* checked state */
        input:checked + .slider{
            background: linear-gradient(90deg,#185a9d,#0f9b8e);
        }

        input:checked + .slider:before{
            transform: translateX(22px);
        }

    </style>
</h:head>

<h:body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">
        <div class="logo">QuickHire</div>

        <h1>Create your account</h1>

        <p>
            Join our platform to connect with opportunities,
            manage hiring, and simplify recruitment workflows.
        </p>

        <div class="features">
            <span>✔ Smart Screening</span>
            <span>✔ Secure &amp; Fast</span>
            <span>✔ Easy Hiring</span>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
        <div class="card">

            <h:form>

                <h2>Sign up</h2>

                <h:messages globalOnly="true" styleClass="error"/>

                <!-- USERNAME -->
                <h:inputText id="username"
                             value="#{registrationJSFManagedBean.user.userName}"
                             styleClass="input"
                             required="true">
                    <f:passThroughAttribute name="placeholder" value="Username"/>
                </h:inputText>
                <h:message for="username" styleClass="error"/>

                <!-- EMAIL -->
                <h:inputText id="email"
                             value="#{registrationJSFManagedBean.user.userEmail}"
                             styleClass="input"
                             required="true">
                    <f:passThroughAttribute name="placeholder" value="Email"/>
                </h:inputText>
                <h:message for="email" styleClass="error"/>

                <!-- PASSWORD -->
                <h:inputSecret id="password"
                               value="#{registrationJSFManagedBean.user.userPassword}"
                               styleClass="input"
                               required="true">
                    <f:passThroughAttribute name="placeholder" value="Password"/>
                </h:inputSecret>
                <h:message for="password" styleClass="error"/>

                <!-- user Is Active -->
                <div class="toggle-container">
                    <h:outputLabel value="Account Active" styleClass="toggle-label"/>
                    <label class="switch">
                        <h:selectBooleanCheckbox
                            value="#{registrationJSFManagedBean.user.userIsActive}"
                            styleClass="toggle-input" />
                        <span class="slider"></span>
                    </label>
                </div>

                <!-- ROLE -->
                <h:selectOneMenu id="role"
                                 value="#{registrationJSFManagedBean.roleId}"
                                 styleClass="input">
                    <f:selectItem itemLabel="Select Role" itemValue="#{null}" />
                    <f:selectItem itemLabel="Candidate" itemValue="2" />
                    <f:selectItem itemLabel="Recruiter" itemValue="3" />
                    <f:ajax execute="@this" render="rolePanel"/>
                </h:selectOneMenu>

                <!-- ROLE BASED -->
                <h:panelGroup id="rolePanel">

                    <!-- CANDIDATE -->
                    <h:panelGroup style="#{registrationJSFManagedBean.roleId == 2 ? '' : 'display:none;'}">

                        <h:inputText id="phone"
                                     value="#{registrationJSFManagedBean.candidate.candidatePhone}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Phone"/>
                        </h:inputText>

                        <h:inputText id="area"
                                    value="#{registrationJSFManagedBean.candidate.candidateArea}"
                                    styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Area"/>
                        </h:inputText>

                        <h:inputText id="city"
                                     value="#{registrationJSFManagedBean.candidate.candidateCity}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="City"/>
                        </h:inputText>

                        <h:inputText id="state"
                                     value="#{registrationJSFManagedBean.candidate.candidateState}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="State"/>
                        </h:inputText>

                        <h:inputText id="dob"
                                     value="#{registrationJSFManagedBean.candidate.candidateDOB}"
                                     styleClass="input">
                            <f:convertDateTime pattern="yyyy-MM-dd"/>
                            <f:passThroughAttribute name="type" value="date"/>
                        </h:inputText>

                        <h:selectOneMenu id="gender"
                                         value="#{registrationJSFManagedBean.candidate.candidateGender}"
                                         styleClass="input">
                            <f:selectItem itemLabel="Gender" itemValue="" />
                            <f:selectItem itemLabel="Male" itemValue="Male"/>
                            <f:selectItem itemLabel="Female" itemValue="Female"/>
                        </h:selectOneMenu>

                        <h:inputText id="experience"
                                     value="#{registrationJSFManagedBean.candidate.candidateExperience}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Experience"/>
                        </h:inputText>

                    </h:panelGroup>

                    <!-- RECRUITER -->
                    <h:panelGroup style="#{registrationJSFManagedBean.roleId == 3 ? '' : 'display:none;'}">

                        <h:inputText id="designation"
                                     value="#{registrationJSFManagedBean.recruiter.designation}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Designation"/>
                        </h:inputText>

                        <h:inputText id="recphone"
                                     value="#{registrationJSFManagedBean.recruiter.recruiterPhone}"
                                     styleClass="input">
                            <f:passThroughAttribute name="placeholder" value="Phone"/>
                        </h:inputText>

                        <h:inputText id="recCompany"
                                     value="#{registrationJSFManagedBean.recruiter.companyId.companyId}"
                                     styleClass="input">
                            <f:convertNumber integerOnly="true"/>
                            <f:passThroughAttribute name="placeholder" value="Company ID"/>
                        </h:inputText>

                    </h:panelGroup>

                </h:panelGroup>

                <!-- BUTTON -->
                <h:commandButton value="Register"
                                 action="#{registrationJSFManagedBean.registerUser}"
                                 styleClass="btn"/>

                <!-- LOGIN -->
                <div class="bottom">
                    <h:link value="Already have an account? Login"
                            outcome="Login.jsf"/>
                </div>

            </h:form>

        </div>
    </div>

</div>

</h:body>
</html>
