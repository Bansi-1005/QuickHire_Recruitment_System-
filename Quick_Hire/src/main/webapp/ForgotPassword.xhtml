<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Forgot Password - QuickHire</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:'Segoe UI',sans-serif;
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:420px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .title{
            text-align:center;
            margin-bottom:20px;
        }

        .title h2{
            margin:0;
            color:#333;
        }

        .title p{
            color:#777;
            font-size:14px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
        }

        .input{
            width:100%;
            padding:10px;
            border:1px solid #ddd;
            border-radius:6px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#1f6fdc;
            color:white;
            cursor:pointer;
            font-weight:600;
        }

        .btn:hover{
            opacity:.9;
        }

        .message{
            color:green;
            text-align:center;
            margin-bottom:15px;
        }

        .back-link{
            text-align:center;
            margin-top:15px;
        }

        .back-link a{
            color:#1f6fdc;
            text-decoration:none;
        }

        /* SUCCESS MESSAGE (GREEN) */
        .server-success {
            margin-bottom: 12px;
            padding: 10px 12px;
            background: #eafaf1;
            border: 1px solid #2ecc71;
            border-left: 5px solid #27ae60;
            border-radius: 6px;
            color: #1e7e34;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            
        }

        /* ERROR MESSAGE (RED) */
        .server-error {
            margin-bottom: 12px;
            padding: 10px 12px;
            background: #fdecea;
            border: 1px solid #e74c3c;
            border-left: 5px solid #c0392b;
            border-radius: 6px;
            color: #a71d2a;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }

        /* OPTIONAL: WARNING (YELLOW if needed later) */
        .server-warn {
            margin-bottom: 12px;
            padding: 10px 12px;
            background: #fff8e6;
            border: 1px solid #f1c40f;
            border-left: 5px solid #f39c12;
            border-radius: 6px;
            color: #8a6d00;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }
    </style>
</h:head>

<h:body>

    <f:metadata>
        <f:viewAction action="#{loginBean.loadRememberMe}" />
    </f:metadata>
    
    <div class="card">

        <div class="title">
            <h2>Forgot Password</h2>
            <p>Reset your QuickHire password</p>
        </div>

        <h:form>

            <h:messages globalOnly="true"
                infoClass="server-success"
                errorClass="server-error"/>

            <!-- EMAIL -->
            <div class="form-group">
                <label>Email Address</label>

                <h:inputText
                    value="#{loginBean.forgotEmail}"
                    styleClass="input"
                    required="true"
                    requiredMessage="Email is required"/>
            </div>

            <!-- SEND OTP -->
            <div class="form-group">

                <h:commandButton
                    value="Send OTP"
                    action="#{loginBean.sendOtp}"
                    styleClass="btn"/>

            </div>

            <!-- OTP -->
            <div class="form-group">

                <label>Enter OTP</label>

                <h:inputText
                    value="#{loginBean.enteredOtp}"
                    styleClass="input"/>

            </div>

            <!-- NEW PASSWORD -->
            <div class="form-group">

                <label>New Password</label>

                <h:inputSecret
                    value="#{loginBean.newPassword}"
                    styleClass="input"/>

            </div>

            <!-- RESET PASSWORD -->
            <div class="form-group">

                <h:commandButton
                    value="Reset Password"
                    action="#{loginBean.resetPassword}"
                    styleClass="btn"/>

            </div>

            <div class="back-link">

                <h:link value="← Back to Login"
                        outcome="/Login.xhtml"/>

            </div>

        </h:form>

    </div>

</h:body>
</html>
