<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:head>
        <title>Recruiter Dashboard</title>

        <style>
            body { font-family: Arial; background: #f4f6f9; }
            .container { width: 500px; margin: 80px auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
            .btn { padding: 10px; width: 100%; background: green; color: white; border: none; margin-top: 10px; border-radius: 5px; }
            .logout { background: red; }
        </style>
    </h:head>

    <h:body>

    <f:metadata>
        <f:viewAction action="#{loginBean.checkLogin}" />
    </f:metadata>

    <div class="container">

    <h:panelGroup rendered="#{loginBean.role eq 'Recruiter'}">

        <h2>Welcome Recruiter 💼</h2>

        <h:outputText value="Username: #{loginBean.username}" /><br/>
        <h:outputText value="Role: #{loginBean.role}" /><br/><br/>

        <h:form>
            <h:commandButton value="View Jobs" action="#{dashboardBean.getJobs()}" styleClass="btn"/>
            <br/><br/>
            <h:outputText value="#{dashboardBean.result}" />
        </h:form>

        <h:form>
            <h:commandButton value="Logout" action="#{loginBean.logout()}" styleClass="btn logout"/>
        </h:form>

    </h:panelGroup>

    <h:panelGroup rendered="#{loginBean.role ne 'Recruiter'}">
        <h2 style="color:red;">Access Denied ❌</h2>
    </h:panelGroup>

    </div>

    </h:body>
</html>
