<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
                      "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            flex: 1;
            background: linear-gradient(135deg, #0f9b8e, #1f6fdc);
            color: white;
            padding: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .left h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .left p {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .features {
            margin-top: 40px;
            display: flex;
            gap: 25px;
            font-size: 14px;
        }

        .right {
            flex: 1;
            background: #f8f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 380px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .input:focus {
            border-color: #1f6fdc;
            outline: none;
            box-shadow: 0 0 5px rgba(31,111,220,0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(to right, #0f9b8e, #1f6fdc);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .bottom {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .error {
            color: red;
            font-size: 12px;
        }

        .server-error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

    </style>
</h:head>

<h:body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">
        <div class="logo">QuickHire</div>

        <h1>Welcome Back</h1>
        <p>
            Login to access your dashboard, manage hiring,
            and explore new opportunities.
        </p>

        <div class="features">
            <span>✔ Smart Screening</span>
            <span>✔ Secure &amp; Fast</span>
            <span>✔ Easy Hiring</span>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
        <div class="card">

            <h:form>

                <h2>Sign in</h2>

                <!-- GLOBAL ERRORS -->
                <h:messages globalOnly="true" styleClass="error"/>

                <!-- USERNAME -->
                <h:inputText id="username"
                             value="#{loginBean.username}"
                             styleClass="input"
                             required="true"
                             requiredMessage="Username is required">
                    <f:passThroughAttribute name="placeholder" value="Username"/>
                </h:inputText>
                <h:message for="username" styleClass="error"/>

                <!-- PASSWORD -->
                <h:inputSecret id="password"
                               value="#{loginBean.password}"
                               styleClass="input"
                               required="true"
                               requiredMessage="Password is required">
                    <f:passThroughAttribute name="placeholder" value="Password"/>
                </h:inputSecret>
                <h:message for="password" styleClass="error"/>

                <!-- LOGIN BUTTON -->
                <h:commandButton value="Login"
                                 action="#{loginBean.login()}"
                                 styleClass="btn"/>

                <!-- SERVER ERROR -->
                <h:outputText value="#{loginBean.message}" styleClass="server-error"/>

                <!-- REGISTER -->
                <div class="bottom">
                    Don’t have an account?
                    <h:link value="Register" outcome="Registration.jsf"/>
                </div>

            </h:form>

        </div>
    </div>

</div>

</h:body>
</html>
