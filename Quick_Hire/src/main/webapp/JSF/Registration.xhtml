<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
        <h:form>

        <!-- ================== TITLE ================== -->
        <h2>Registration</h2>

        <!-- ================= COMMON USER FIELDS ================= -->
        <h:panelGrid columns="2" columnClasses="labelColumn,valueColumn" styleClass="commonFields" cellpadding="5">

            <h:outputLabel value="Username:" for="username" />
            <h:inputText id="username" value="#{registrationJSFManagedBean.user.userName}" required="true" />

            <h:outputLabel value="Email:" for="email" />
            <h:inputText id="email" value="#{registrationJSFManagedBean.user.userEmail}" required="true" />

            <h:outputLabel value="Password:" for="password" />
            <h:inputSecret id="password" value="#{registrationJSFManagedBean.user.userPassword}" required="true" />

            <h:outputLabel value="Role:" for="role" />
            <h:selectOneMenu id="role" value="#{registrationJSFManagedBean.roleId}" required="true" requiredMessage="Please select a role.">
                <f:selectItem itemLabel="-- Select Role --" itemValue="#{null}" />
                <f:selectItem itemLabel="Candidate" itemValue="2" />
                <f:selectItem itemLabel="Recruiter" itemValue="3" />
                <f:ajax render="rolePanel" />
            </h:selectOneMenu>

        </h:panelGrid>

        <br/>

        <!-- ================= ROLE BASED PANELS ================= -->
        <h:panelGroup id="rolePanel">

            <!-- ================= CANDIDATE DETAILS ================= -->
            <h:panelGrid columns="2" columnClasses="labelColumn,valueColumn" rendered="#{registrationJSFManagedBean.roleId == 2}" cellpadding="5">
                <h3>Candidate Details</h3>

                <h:outputLabel value="Phone:" for="candPhone" />
                <h:inputText id="candPhone" value="#{registrationJSFManagedBean.candidate.candidatePhone}" />

                <h:outputLabel value="Location:" for="location" />
                <h:inputText id="location" value="#{registrationJSFManagedBean.candidate.candidateLocation}" />

                <h:outputLabel value="Date of Birth:" for="dob" />
                <h:inputText id="dob" value="#{registrationJSFManagedBean.candidate.candidateDOB}">
                    <f:convertDateTime pattern="yyyy-MM-dd" />
                    <f:passThroughAttribute name="type" value="date" />
                </h:inputText>

                <h:outputLabel value="Gender:" for="gender" />
                <h:selectOneMenu id="gender" value="#{registrationJSFManagedBean.candidate.candidateGender}">
                    <f:selectItem itemLabel="Male" itemValue="Male" />
                    <f:selectItem itemLabel="Female" itemValue="Female" />
                </h:selectOneMenu>

                <h:outputLabel value="Experience:" for="experience" />
                <h:inputText id="experience" value="#{registrationJSFManagedBean.candidate.candidateExperience}" />

            </h:panelGrid>

            <!-- ================= RECRUITER DETAILS ================= -->
            <h:panelGrid columns="2" columnClasses="labelColumn,valueColumn" rendered="#{registrationJSFManagedBean.roleId == 3}" cellpadding="5">
                <h3>Recruiter Details</h3>

                <h:outputLabel value="Designation:" for="designation" />
                <h:inputText id="designation" value="#{registrationJSFManagedBean.recruiter.designation}" />

                <h:outputLabel value="Phone:" for="recPhone" />
                <h:inputText id="recPhone" value="#{registrationJSFManagedBean.recruiter.recruiterPhone}" />

                <h:outputLabel value="Company ID:" for="companyId" />
                <h:inputText id="companyId" value="#{registrationJSFManagedBean.recruiter.companyId.companyId}" />

            </h:panelGrid>

        </h:panelGroup>

        <br/>

        <!-- ================= SUBMIT BUTTON ================= -->
        <h:commandButton value="Register" action="#{registrationJSFManagedBean.registerUser}" style="padding: 8px 20px;" />

    </h:form>

    <!-- ================= STYLES ================= -->
    <style>
        .labelColumn { font-weight: bold; padding-right: 10px; text-align: right; vertical-align: middle; }
        .valueColumn { text-align: left; }
        h3 { margin-top: 20px; color: #2c3e50; }
        .commonFields { margin-bottom: 20px; }
        h2 { color: #34495e; }
    </style>

    </h:body>
</html>
