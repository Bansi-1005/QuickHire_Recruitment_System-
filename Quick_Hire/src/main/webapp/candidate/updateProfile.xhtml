<?xml version='1.0' encoding='UTF-8' ?>
<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

 <!-- ================= CANDIDATE PROFILE MODAL ================= -->
    <h:panelGroup layout="block" id="candidateProfileModal" styleClass="modal-overlay">

        <div class="modal-box">

            <div class="modal-header">
                <div>
                    <h3>Update Profile</h3>
                    <p class="modal-subtitle">Keep your profile updated for better visibility</p>
                </div>
                <span class="close-btn" onclick="closeCandidateModal()">×</span>
            </div>

            <h:form id="candidateForm" styleClass="profile-form" enctype="multipart/form-data">

                <h:messages id="messages" globalOnly="true"/>

                <h:inputHidden value="#{candidateCDIBean.candidateObj.candidateId}" />

                <!-- PROFILE TOP SECTION -->
                <div class="profile-top">

                    <!-- PROFILE IMAGE -->
                    <div class="avatar-section">

                        <h:panelGroup layout="block">

                            <!-- IF PHOTO EXISTS -->
                            <h:graphicImage
                                value="/uploads/profilephotos/#{candidateCDIBean.candidateObj.userId.profilePhoto}"
                                styleClass="profile-avatar"
                                rendered="#{not empty candidateCDIBean.candidateObj.userId.profilePhoto}" />

                            <!-- IF NO PHOTO → INITIAL -->
                            <h:panelGroup
                                layout="block"
                                styleClass="profile-avatar-fallback"
                                rendered="#{empty candidateCDIBean.candidateObj.userId.profilePhoto}">

                                #{candidateCDIBean.candidateObj.userId.userName.substring(0,1)}

                            </h:panelGroup>

                        </h:panelGroup>

                        <h:inputFile value="#{candidateCDIBean.profilePhoto}"
                                     styleClass="file-input"/>

                    </div>

                    <!-- NAME + EMAIL QUICK VIEW -->
                    <div class="quick-info">
                        <h2>#{candidateCDIBean.candidateObj.userId.userName}</h2>
                        <p>#{candidateCDIBean.candidateObj.userId.userEmail}</p>
                    </div>

                </div>

                <!-- FORM GRID -->
                <div class="profile-grid">

                    <h3 class="section-title">Personal Information</h3>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Name</label>
                            <h:inputText value="#{candidateCDIBean.candidateObj.userId.userName}" />
                        </div>

                        <div class="form-group">
                            <label>Phone</label>
                            <h:inputText value="#{candidateCDIBean.candidateObj.candidatePhone}" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <h:inputText value="#{candidateCDIBean.candidateObj.userId.userEmail}" />
                    </div>

                    <h3 class="section-title">Location</h3>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Area</label>
                            <h:inputText value="#{candidateCDIBean.candidateObj.candidateArea}" />
                        </div>

                        <div class="form-group">
                            <label>City</label>
                            <h:inputText value="#{candidateCDIBean.candidateObj.candidateCity}" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>State</label>
                        <h:inputText value="#{candidateCDIBean.candidateObj.candidateState}" />
                    </div>

                    <h3 class="section-title">Professional</h3>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>DOB</label>
                            <h:inputText value="#{candidateCDIBean.candidateObj.candidateDOB}"
                                        styleClass="form-control"
                                        type="date">
                               <f:convertDateTime pattern="yyyy-MM-dd"/>
                           </h:inputText>
                        </div>

                        <div class="form-group">
                            <label>Experience</label>
                            <h:inputText value="#{candidateCDIBean.candidateObj.candidateExperience}" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <h:selectOneRadio value="#{candidateCDIBean.candidateObj.candidateGender}">
                            <f:selectItem itemLabel="Male" itemValue="Male"/>
                            <f:selectItem itemLabel="Female" itemValue="Female"/>
                            <f:selectItem itemLabel="Other" itemValue="Other"/>
                        </h:selectOneRadio>
                    </div>

                </div>

                <!-- ACTIONS -->
                <div class="modal-actions">

                    <h:commandButton value="Save Changes"
                                     action="#{candidateCDIBean.updateProfile}"
                                     styleClass="btn-main"/>

                    <button type="button" class="btn-cancel"
                            onclick="closeCandidateModal()">Cancel</button>

                </div>

            </h:form>

        </div>
    </h:panelGroup>


<!-- COMMON FOOTER -->
<ui:include src="/common/footer.xhtml"/>

 <script>
        function clearCandidateMessages() {
            var msg = document.getElementById("candidateForm:messages");
            if (msg) {
                msg.innerHTML = "";
            }
        }

        function openCandidateModal() {
            clearCandidateMessages();
            document.getElementById("candidateProfileModal").style.display = "flex";
        }

        function closeCandidateModal() {
            clearCandidateMessages();
            document.getElementById("candidateProfileModal").style.display = "none";
        }
    </script>

</ui:composition>
